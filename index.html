<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn English</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Pantalla Login -->
    <section id="login" class="pantalla">
        <h1>Learn English</h1>
        <p>Aprende inglés de forma sencilla</p>

        <input type="text" id="usuario" placeholder="Usuario">

        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="ingresar()">Ingresar</button>
    </section>


    <!-- Pantalla Home -->
    <section id="home" class="pantalla oculto">

        <h1>Welcome</h1>
        <p>Selecciona una opción para comenzar</p>

        <button>Vocabulary</button>
        <button onclick="mostrarLessons()">Lessons</button>
        <button>Practice</button>

    </section>


    <!-- Pantalla Lessons -->
    <section id="lessons" class="pantalla oculto">

        <h1>Lessons</h1>

        <div class="tarjeta">
            <h2>Greetings</h2>

            <p>Hello = Hola</p>
            <p>Good morning = Buenos días</p>
            <p>How are you? = ¿Cómo estás?</p>

        </div>

        <button onclick="volverHome()">Volver</button>

    </section>


<script src="script.js"></script>

</body>
</html>
